name: Publish Package

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          always-auth: true

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '5.x'

      - name: Gitversion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm -F './packages/**/*' build

      - name: Set Version
        run: pnpm -F './packages/**/*' exec json -f "package.json" -I -e 'this.version = "${{ steps.gitversion.outputs.fullSemVer }}"'

      - name: Publish praxis
        working-directory: ./packages/praxis
        run: pnpm publish --access public --no-git-checks --tag latest
